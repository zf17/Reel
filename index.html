    // ─────────────────────────────────────────────
    // PAGE: BROWSE
    // Real TMDB data: search + category tabs.
    // Click a card → Rate & Add modal.
    // ─────────────────────────────────────────────
    function BrowsePage({ watchedItems, onAdd }) {
      const CATEGORIES = ['Trending', 'Top Movies', 'Top Series', 'New Movies', 'New Series', 'Action', 'Comedy', 'Horror', 'Sci-Fi', 'Drama', 'Documentary'];

      const [category, setCategory] = useState('Trending');
      const [results, setResults] = useState([]);
      const [loading, setLoading] = useState(false);
      const [loadingMore, setLoadingMore] = useState(false);
      const [nextPage, setNextPage] = useState(4);       // next page to fetch (we pre-load 1-3)
      const [totalPages, setTotalPages] = useState(1);  // from TMDB response
      const [searchQuery, setSearchQuery] = useState('');
      const [searchMode, setSearchMode] = useState(false);
      const [selectedItem, setSelectedItem] = useState(null);
      const searchTimer = useRef(null);

      const watchedIds = new Set(watchedItems.map(i => i.tmdbId).filter(Boolean));

      // On category change: fetch pages 1, 2, 3 in parallel → ~60 items immediately
      useEffect(() => {
        if (searchMode) return;
        setLoading(true);
        setResults([]);
        setNextPage(4);

        // Fetch pages 1–3 in parallel for all categories (~60 items upfront)
        const pagesToFetch = [1, 2, 3];

        Promise.all(pagesToFetch.map(p => fetchCategory(category, p)))
          .then(pages => {
            // Deduplicate by tmdbId across pages
            const seen = new Set();
            const merged = [];
            for (const page of pages) {
              for (const item of page.results) {
                if (!seen.has(item.tmdbId)) { seen.add(item.tmdbId); merged.push(item); }
              }
            }
            setResults(merged);
            setTotalPages(pages[0].totalPages);
            setLoading(false);
          })
          .catch(() => setLoading(false));
      }, [category, searchMode]);

      // Append next page when user clicks Load More
      const handleLoadMore = () => {
        if (loadingMore || nextPage > totalPages) return;
        setLoadingMore(true);
        fetchCategory(category, nextPage)
          .then(page => {
            setResults(prev => {
              const seen = new Set(prev.map(i => i.tmdbId));
              const fresh = page.results.filter(i => !seen.has(i.tmdbId));
              return [...prev, ...fresh];
            });
            setNextPage(p => p + 1);
            setLoadingMore(false);
          })
          .catch(() => setLoadingMore(false));
      };

      // Debounced search
      const handleSearchChange = (val) => {
        setSearchQuery(val);
        clearTimeout(searchTimer.current);
        if (!val.trim()) { setSearchMode(false); return; }
        setSearchMode(true);
        setLoading(true);
        searchTimer.current = setTimeout(() => {
          searchTmdb(val)
            .then(data => { setResults(data); setLoading(false); })
            .catch(() => setLoading(false));
        }, 450);
      };

      const clearSearch = () => { setSearchQuery(''); setSearchMode(false); };

      const hasMore = !searchMode && nextPage <= totalPages;

      return (
        <div>
          <div className="page-header">
            <div>
              <h1 className="page-title"><span>Browse</span></h1>
              <p className="page-subtitle">
                {!loading && results.length > 0 && !searchMode
                  ? `${results.length} titles · page ${nextPage - 1} of ${totalPages}`
                  : 'Discover what to watch next'
                }
              </p>
            </div>
          </div>

          {/* Search bar */}
          <div className="browse-search-bar">
            <span className="browse-search-icon">🔍</span>
            <input
              className="browse-search-input"
              placeholder="Search for a movie or show..."
              value={searchQuery}
              onChange={e => handleSearchChange(e.target.value)}
            />
            {searchMode && (
              <button className="btn" onClick={clearSearch} style={{ borderRadius:'100px', padding:'8px 16px' }}>Clear</button>
            )}
          </div>

          {/* Category tabs */}
          {!searchMode && (
            <div className="browse-tabs">
              {CATEGORIES.map(c => (
                <button key={c} className={`browse-tab ${category === c ? 'active' : ''}`} onClick={() => setCategory(c)}>
                  {c}
                </button>
              ))}
            </div>
          )}

          {searchMode && searchQuery && (
            <div className="section-label" style={{ marginBottom:'1.25rem' }}>
              Results for "{searchQuery}"
            </div>
          )}

          {/* Grid */}
          {loading ? (
            <div style={{ display:'flex', justifyContent:'center', padding:'4rem', gap:'12px', color:'var(--c-muted)', alignItems:'center' }}>
              <div className="spinner" />
              <span style={{ fontSize:'0.9rem' }}>Fetching from TMDB...</span>
            </div>
          ) : results.length === 0 ? (
            <div style={{ textAlign:'center', padding:'4rem', color:'var(--c-muted)' }}>
              <div style={{ fontSize:'3rem', marginBottom:'1rem' }}>🎬</div>
              <p>{searchMode ? 'No results found. Try a different search.' : 'Nothing loaded. Check your connection.'}</p>
            </div>
          ) : (
            <>
              <div className="tmdb-grid">
                {results.map(item => {
                  const isWatched = watchedIds.has(item.tmdbId);
                  return (
                    <div className="tmdb-card" key={item.tmdbId} onClick={() => setSelectedItem(item)}>
                      {item.poster
                        ? <img src={item.poster} alt={item.title} className="tmdb-poster" loading="lazy" />
                        : <div className="tmdb-poster-placeholder">{GENRE_EMOJI[item.genre] || '🎞'}</div>
                      }
                      {isWatched && <div className="watched-badge">✓ Watched</div>}
                      <div className="tmdb-card-body">
                        <div className="tmdb-card-title" title={item.title}>{item.title}</div>
                        <div className="tmdb-card-meta">
                          <span>{item.year || '—'}</span>
                          {item.tmdbRating && <><span>·</span><span className="tmdb-rating">★ {item.tmdbRating}</span></>}
                        </div>
                      </div>
                      <div className="tmdb-card-hover">
                        <button className="tmdb-add-btn" onClick={e => { e.stopPropagation(); setSelectedItem(item); }}>
                          {isWatched ? '✓ Rate again' : '+ Add to Watched'}
                        </button>
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* Load More button — only shown for category browsing, not search */}
              {hasMore && (
                <div style={{ textAlign:'center', marginTop:'2.5rem', paddingBottom:'1rem' }}>
                  <button
                    className="btn"
                    onClick={handleLoadMore}
                    disabled={loadingMore}
                    style={{ padding:'12px 32px', borderRadius:'100px', fontSize:'0.875rem', gap:'10px' }}
                  >
                    {loadingMore
                      ? <><div className="spinner" style={{ width:'14px', height:'14px', borderWidth:'2px' }} /> Loading...</>
                      : `Load more  ·  page ${nextPage} of ${totalPages}`
                    }
                  </button>
                </div>
              )}
            </>
          )}

          {selectedItem && (
            <RateModal
              tmdbItem={selectedItem}
              alreadyWatched={watchedIds.has(selectedItem.tmdbId)}
              onClose={() => setSelectedItem(null)}
              onAdd={(item) => { onAdd(item); setSelectedItem(null); }}
            />
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────
    // PAGE: DASHBOARD (Home)
    // ─────────────────────────────────────────────
    function DashboardPage({ items, onAdd, onNavigate, userName }) {
      const recentItems = [...items].sort((a,b) => new Date(b.dateWatched) - new Date(a.dateWatched)).slice(0,3);
      const avgScore = items.length > 0
        ? Math.round(items.reduce((s,i) => s + computeVibeScore(i.vibes), 0) / items.length)
        : 0;

      // Top mood overall
      const moodTotals = {};
      items.forEach(i => i.moods.forEach(m => { moodTotals[m] = (moodTotals[m] || 0) + 1; }));
      const topMoodId = Object.entries(moodTotals).sort((a,b) => b[1]-a[1])[0]?.[0];
      const topMood = MOODS.find(m => m.id === topMoodId);

      const moviesCount = items.filter(i => i.type === 'Movie').length;
      const seriesCount = items.filter(i => i.type !== 'Movie').length;

      return (
        <div>
          <div className="page-header" style={{ marginBottom:'2rem' }}>
            <div>
              <h1 className="page-title" style={{ fontSize:'2.6rem' }}>
                Good evening,<br />
                <span>{userName || 'Cinephile'}.</span>
              </h1>
              <p className="page-subtitle" style={{ marginTop:'8px' }}>What are you watching tonight?</p>
            </div>
            <button className="btn btn-oracle" onClick={() => onNavigate('discover')}>
              ✦ What should I watch?
            </button>
          </div>

          {/* Stats Row */}
          <div className="stats-grid">
            <div className="stat-card">
              <div className="stat-label">Titles Watched</div>
              <div className="stat-value">{items.length}</div>
              <div className="stat-sub">{moviesCount} films · {seriesCount} series</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Avg Vibe Score</div>
              <div className="stat-value">{avgScore || '—'}</div>
              <div className="stat-sub">out of 100</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Top Mood</div>
              <div className="stat-value" style={{ fontSize:'1.6rem' }}>
                {topMood ? `${topMood.emoji} ${topMood.label}` : '—'}
              </div>
              <div className="stat-sub">most frequent tag</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Universe Status</div>
              <div className="stat-value" style={{ fontSize:'1.2rem', paddingTop:'6px' }}>
                {items.length < 3 ? 'Just beginning' : items.length < 8 ? 'Growing' : items.length < 15 ? 'Expanding' : 'Vast'}
              </div>
              <div className="stat-sub">keep watching</div>
            </div>
          </div>

          {/* Oracle CTA */}
          <div className="oracle-section">
            <div className="oracle-title">The Oracle awaits ✦</div>
            <p className="oracle-sub">Tell it your mood and it'll pull real recommendations live from TMDB.</p>
            <button className="btn btn-oracle" onClick={() => onNavigate('discover')}>Consult the Oracle →</button>
          </div>

          {/* Recent watches */}
          {recentItems.length > 0 && (
            <>
              <div className="section-label">Recently Watched</div>
              <div className="content-grid" style={{ gridTemplateColumns:'repeat(auto-fill, minmax(240px, 1fr))' }}>
                {recentItems.map(item => (
                  <div className="content-card" key={item.id} style={{ cursor:'default' }}>
                    <div className="card-poster" style={{ height:'120px', background:'var(--c-surface2)' }}>
                      <span style={{ fontSize:'3rem' }}>{GENRE_EMOJI[item.genre] || '🎞'}</span>
                    </div>
                    <div className="card-body">
                      <div className="card-title" style={{ fontSize:'1rem' }}>{item.title}</div>
                      <div className="card-meta">
                        <span>{item.genre}</span>
                        <span className="card-meta-dot" />
                        <span>{item.dateWatched}</span>
                      </div>
                      <div className="vibe-display">
                        <div className="vibe-bar">
                          <div className="vibe-fill" style={{ width:`${computeVibeScore(item.vibes)}%` }} />
                        </div>
                        <span className="vibe-score">{computeVibeScore(item.vibes)}</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </>
          )}

          {items.length === 0 && (
            <div style={{ textAlign:'center', padding:'3rem', color:'var(--c-muted)' }}>
              <div style={{ fontSize:'3.5rem', marginBottom:'1rem' }}>🌌</div>
              <h3 style={{ fontFamily:'var(--font-display)', fontStyle:'italic', marginBottom:'0.5rem', color:'var(--c-text)' }}>
                Your universe is empty
              </h3>
              <p style={{ marginBottom:'1.5rem' }}>Start building your collection</p>
              <button className="btn btn-primary" onClick={onAdd}>+ Add your first title</button>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────
    // THEME SYSTEM
    // ─────────────────────────────────────────────

    const THEMES = [
      { id: 'midnight', label: 'Midnight', color1: '#8b7cf8', color2: '#f28bca' },
      { id: 'aurora',   label: 'Aurora',   color1: '#f72585', color2: '#7209b7' },
      { id: 'ocean',    label: 'Ocean',    color1: '#0096c7', color2: '#48cae4' },
      { id: 'ember',    label: 'Ember',    color1: '#ff6b35', color2: '#ffd166' },
      { id: 'neon',     label: 'Neon',     color1: '#39ff14', color2: '#00e5ff' },
      { id: 'rose',     label: 'Rose',     color1: '#fb7185', color2: '#fda4af' },
      { id: 'gold',     label: 'Gold',     color1: '#f4c542', color2: '#e8a419' },
      { id: 'slate',    label: 'Slate',    color1: '#94a3b8', color2: '#cbd5e1' },
    ];

    // Apply theme to <body> — called on mount and whenever theme/moodReactive changes
    function applyTheme(theme, moodReactive) {
      document.body.setAttribute('data-theme', theme);
      document.body.setAttribute('data-mood-reactive', moodReactive ? 'on' : 'off');
    }

    // ─────────────────────────────────────────────
    // THEME PANEL COMPONENT
    // Floating panel above the cog button in sidebar
    // ─────────────────────────────────────────────
    function ThemePanel({ theme, moodReactive, onThemeChange, onMoodReactiveChange, onClose }) {
      return (
        <>
          <div className="theme-panel-backdrop" onClick={onClose} />
          <div className="theme-panel">
            {/* Mood-reactive toggle */}
            <div className="theme-toggle-row">
              <div>
                <div className="theme-toggle-label">Mood-reactive</div>
                <div className="theme-toggle-sub">Theme shifts with Oracle mood</div>
              </div>
              <button
                className={`pill-toggle ${moodReactive ? 'on' : 'off'}`}
                onClick={() => onMoodReactiveChange(!moodReactive)}
              />
            </div>

            {/* Preset swatches — disabled when mood-reactive is on */}
            <div className="theme-panel-title">Theme</div>
            <div className="theme-swatches" style={{ opacity: moodReactive ? 0.35 : 1, pointerEvents: moodReactive ? 'none' : 'auto' }}>
              {THEMES.map(t => (
                <div
                  key={t.id}
                  className={`theme-swatch ${theme === t.id ? 'active' : ''}`}
                  onClick={() => onThemeChange(t.id)}
                >
                  <div
                    className="swatch-dot"
                    style={{ background: `linear-gradient(135deg, ${t.color1}, ${t.color2})` }}
                  />
                  <span className="swatch-label">{t.label}</span>
                </div>
              ))}
            </div>
          </div>
        </>
      );
    }

    // ─────────────────────────────────────────────
    // MAIN APP — auth-aware
    // ─────────────────────────────────────────────
    function App() {
      // ── Auth state ──
      const [currentUser, setCurrentUser] = useState(() => loadSession());

      // ── App state (scoped to current user) ──
      const [page, setPage] = useState('home');
      const [items, setItems] = useState([]);
      const { toasts, addToast } = useToasts();

      // ── Theme state — persisted globally (not per-user) ──
      const [theme, setTheme] = useState(() => localStorage.getItem('reel-theme') || 'midnight');
      const [moodReactive, setMoodReactive] = useState(() => localStorage.getItem('reel-mood-reactive') !== 'false');
      const [showThemePanel, setShowThemePanel] = useState(false);

      // Apply theme to <body> on mount and whenever it changes
      useEffect(() => {
        applyTheme(theme, moodReactive);
        localStorage.setItem('reel-theme', theme);
        localStorage.setItem('reel-mood-reactive', moodReactive);
      }, [theme, moodReactive]);

      // Load this user's watchlist whenever the logged-in user changes
      useEffect(() => {
        if (!currentUser) { setItems([]); return; }
        const key = userDataKey(currentUser.userId);
        try {
          const saved = localStorage.getItem(key);
          setItems(saved ? JSON.parse(saved) : []);
        } catch { setItems([]); }
        // Reset to home page on login
        setPage('home');
      }, [currentUser?.userId]);

      // Persist this user's watchlist on every change
      useEffect(() => {
        if (!currentUser) return;
        localStorage.setItem(userDataKey(currentUser.userId), JSON.stringify(items));
      }, [items, currentUser?.userId]);

      // ── Auth handlers ──
      const handleAuth = (user) => {
        // user from registerUser/signInUser has shape { id, email, name, ... }
        // session shape uses userId for the key
        const session = { userId: user.id, email: user.email, name: user.name };
        setCurrentUser(session);
      };

      const handleSignOut = () => {
        clearSession();
        setCurrentUser(null);
        setItems([]);
        setPage('home');
        addToast('Signed out. See you next time ✦');
      };

      // ── Show auth screen if not logged in ──
      if (!currentUser) {
        return (
          <>
            <AuthScreen onAuth={handleAuth} />
            <div className="toast-container">
              {toasts.map(t => <div key={t.id} className="toast">{t.msg}</div>)}
            </div>
          </>
        );
      }

      // ── Logged-in app ──
      const handleAdd = (item) => {
        setItems(prev => [item, ...prev]);
        addToast(`✦ "${item.title}" added to your universe`);
      };

      const handleDelete = (id) => {
        const item = items.find(i => i.id === id);
        setItems(prev => prev.filter(i => i.id !== id));
        addToast(`"${item?.title}" removed`);
      };

      const profile = derivePersonality(items);
      const initials = getInitials(currentUser.name, currentUser.email);

      const NAV = [
        { id: 'home',        icon: '⌂', label: 'Dashboard' },
        { id: 'browse',      icon: '◎', label: 'Browse' },
        { id: 'library',     icon: '◈', label: 'My Watched' },
        { id: 'discover',    icon: '✦', label: 'The Oracle' },
        { id: 'personality', icon: '◆', label: 'My Profile' },
      ];

      return (
        <>
          <div className="app-shell">
            {/* Sidebar */}
            <aside className="sidebar">
              <div>
                <div className="logo">REEL</div>
                <div className="logo-sub">Your Cinematic Universe</div>
              </div>

              <nav className="nav-section">
                <label>Navigation</label>
                {NAV.map(n => (
                  <button key={n.id} className={`nav-btn ${page === n.id ? 'active' : ''}`} onClick={() => setPage(n.id)}>
                    <span className="icon">{n.icon}</span>
                    {n.label}
                  </button>
                ))}
              </nav>

              <div className="nav-section">
                <label>Quick Add</label>
                <button className="nav-btn" onClick={() => setPage('browse')}>
                  <span className="icon">+</span>
                  Add Title
                </button>
              </div>

              {/* Personality badge */}
              {profile && (
                <div className="personality-badge">
                  <div className="label">Your Archetype</div>
                  <div className="type">{profile.emoji} {profile.type}</div>
                  <div className="desc">{profile.tagline}</div>
                </div>
              )}

              {/* Signed-in user + sign out */}
              <div style={{ marginTop:'auto', display:'flex', flexDirection:'column', gap:'8px' }}>
                {/* Cog / theme button */}
                <button
                  className="nav-btn"
                  onClick={() => setShowThemePanel(p => !p)}
                  style={{ color: showThemePanel ? 'var(--c-accent)' : 'var(--c-muted)' }}
                >
                  <span className="icon">⚙</span>
                  Theme
                  <span style={{ marginLeft:'auto', fontSize:'0.65rem', color:'var(--c-muted)', textTransform:'capitalize' }}>
                    {moodReactive ? 'Reactive' : THEMES.find(t => t.id === theme)?.label}
                  </span>
                </button>

                <div className="sidebar-user">
                  <div className="user-avatar">{initials}</div>
                  <div className="user-info">
                    <div className="user-name">{currentUser.name}</div>
                    <div className="user-email">{currentUser.email}</div>
                  </div>
                  <button className="sign-out-btn" onClick={handleSignOut} title="Sign out">↪</button>
                </div>
              </div>
            </aside>

            {/* Main content */}
            <main className="main">
              {page === 'home' && (
                <DashboardPage
                  items={items}
                  onAdd={() => setPage('browse')}
                  onNavigate={setPage}
                  userName={currentUser.name}
                />
              )}
              {page === 'browse' && (
                <BrowsePage watchedItems={items} onAdd={handleAdd} />
              )}
              {page === 'library' && (
                <LibraryPage
                  items={items}
                  onDelete={handleDelete}
                  onAdd={() => setPage('browse')}
                />
              )}
              {page === 'discover' && <DiscoverPage items={items} onAdd={handleAdd} moodReactive={moodReactive} />}
              {page === 'personality' && <PersonalityPage items={items} />}
            </main>
          </div>

          {/* Theme panel — rendered outside sidebar so it floats freely */}
          {showThemePanel && (
            <ThemePanel
              theme={theme}
              moodReactive={moodReactive}
              onThemeChange={t => setTheme(t)}
              onMoodReactiveChange={v => setMoodReactive(v)}
              onClose={() => setShowThemePanel(false)}
            />
          )}

          <div className="toast-container">
            {toasts.map(t => <div key={t.id} className="toast">{t.msg}</div>)}
          </div>
        </>
      );
    }

    // Mount
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
